name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  plugin:
    name: plugin (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  cli:
    name: cli (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt
      - name: Import smoke test
        run: |
          ./venv/bin/python -c "from atproto import Client; print('atproto import OK')"
          ./venv/bin/python -c "import sys; sys.path.insert(0, '.'); from _facets import extract_facets; print('facets module OK')"
